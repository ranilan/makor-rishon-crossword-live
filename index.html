<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f6f1e5">
    <title>תשבץ מקור ראשון</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="kicker">מקור ראשון · דקל בנו</p>
          <h1>תשבץ היגיון</h1>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="archive-button" type="button">ארכיון</button>
          <button class="icon-button" id="share-button" type="button">שיתוף</button>
          <button class="icon-button" id="toggle-source" type="button" aria-label="הצגת המקור">מקור</button>
        </div>
      </header>

      <section class="solve-layout">
        <div class="board-panel">
          <div class="board-wrap">
            <div id="board" class="board" aria-label="רשת תשבץ 11 על 11"></div>
          </div>
          <div class="active-clue" id="active-clue">בחרו משבצת או הגדרה כדי להתחיל</div>
          <div class="toolbar" aria-label="כלי פתרון">
            <button id="dir-toggle" type="button">מאוזן</button>
            <button id="prev-clue" type="button">הקודם</button>
            <button id="next-clue" type="button">הבא</button>
            <button id="clear-entry" type="button">נקה מילה</button>
            <button id="check-entry" type="button">בדוק מילה</button>
            <button id="check-all" type="button">בדוק הכל</button>
          </div>
          <div class="feedback" id="feedback" aria-live="polite"></div>
        </div>

        <aside class="clues-panel">
          <div class="tabs" role="tablist" aria-label="כיווני הגדרות">
            <button class="tab active" data-tab="across" type="button">מאוזן</button>
            <button class="tab" data-tab="down" type="button">מאונך</button>
          </div>
          <div id="clues" class="clues"></div>
        </aside>
      </section>
    </main>

    <dialog id="source-dialog" class="source-dialog">
      <div class="dialog-bar">
        <strong>המקור</strong>
        <form method="dialog"><button type="submit">סגור</button></form>
      </div>
      <img src="assets/makor-rishon-dekel-beno-2026-07-03.jpg" alt="תמונת התשבץ המקורית">
      <a href="assets/makor-rishon-dekel-beno-2026-07-03.pdf">פתיחת PDF</a>
    </dialog>

    <dialog id="archive-dialog" class="source-dialog">
      <div class="dialog-bar">
        <strong>ארכיון</strong>
        <form method="dialog"><button type="submit">סגור</button></form>
      </div>
      <div class="archive-list">
        <a href="./">03/07/2026 · מקור ראשון · דקל בנו</a>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
